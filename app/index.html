<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Applica il tema salvato PRIMA del primo paint, così al reload non c'è
      // flash e la scelta dell'utente vince sempre, senza dipendere dal timing
      // di React (vedi useTheme.ts).
      (function () {
        try {
          if (localStorage.getItem('vesper-theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light')
            var m = document.querySelector('meta[name="theme-color"]')
            if (m) m.setAttribute('content', '#f0ece0')
          }
        } catch (e) {}
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#171520" />
    <link rel="preload" href="/fonts/Atkinson-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vesper" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Vesper</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
